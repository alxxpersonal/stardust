name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -count=1 ./...
      - name: lint
        run: |
          BINDIR="$(go env GOPATH)/bin"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$BINDIR" v2.11.3
          "$BINDIR/golangci-lint" run ./...

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        run: npm ci
        working-directory: plugin/obsidian
      - name: build
        run: npm run build
        working-directory: plugin/obsidian
